# Fly.io configuration template for static sites
# Copy this to your app folder and rename to fly.toml
# Update the app name to be unique

app = "your-app-name-here"
primary_region = "lhr"  # e.g. lhr (London), ord (Chicago) — see Fly regions docs

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# Optional: Add environment variables
# [env]
#   ENV = "production"
