app = "dsl-runner-idea"
primary_region = "lhr"

[mounts]
  source = "dsl_runner_data"
  destination = "/data"

[build]

[env]
  PORT = "3000"
  DATABASE_URL = "file:/data/dsl-runner.db"
  REDIS_HOST = "127.0.0.1"
  REDIS_PORT = "6379"
  OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
