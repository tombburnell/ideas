<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retro Snake — High Scores</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="crt">
      <header class="header">
        <h1>SNAKE</h1>
        <p class="sub">Eat the red squares · don’t hit walls or yourself</p>
      </header>
      <main class="layout">
        <section class="panel game-panel">
          <div class="hud">
            <span id="score">SCORE 0000</span>
            <span id="status" class="blink">READY</span>
          </div>
          <div class="canvas-wrap" id="canvasWrap">
            <canvas id="game" width="400" height="400" aria-label="Snake game"></canvas>
          </div>
          <div class="controls" aria-label="Keyboard controls">
            <h3 class="controls-title">CONTROLS</h3>
            <ul class="controls-list">
              <li><span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> Move</li>
              <li><span class="key">P</span> Pause / resume</li>
              <li><span class="key">R</span> Restart</li>
              <li><span class="key">Tap</span> board to start (desktop: click)</li>
              <li class="controls-mobile-note">On phone: big <span class="key">←</span><span class="key">→</span> at bottom + up/down above</li>
              <li>After game over: enter name → <span class="key">SUBMIT</span> score</li>
            </ul>
          </div>
          <div class="name-row">
            <label for="playerName">NAME</label>
            <input
              id="playerName"
              type="text"
              maxlength="32"
              placeholder="AAA"
              autocomplete="off"
            />
            <button type="button" id="submitScore" disabled>SUBMIT</button>
          </div>
          <div class="touch-pad" id="touchPad" aria-label="Touch controls">
            <div class="touch-row touch-row-ud">
              <button type="button" class="touch-btn touch-btn-small" data-dir="up" aria-label="Move up">↑</button>
              <button type="button" class="touch-btn touch-btn-small" data-dir="down" aria-label="Move down">↓</button>
            </div>
            <div class="touch-row touch-row-extras">
              <button type="button" class="touch-btn touch-btn-small" id="touchPause" aria-label="Pause or resume">
                ‖
              </button>
              <button type="button" class="touch-btn touch-btn-small" id="touchRestart" aria-label="Restart game">
                ↺
              </button>
            </div>
            <div class="touch-row touch-row-lr">
              <button type="button" class="touch-btn touch-btn-lr" data-dir="left" aria-label="Move left">←</button>
              <button type="button" class="touch-btn touch-btn-lr" data-dir="right" aria-label="Move right">→</button>
            </div>
          </div>
        </section>
        <section class="panel scores-panel">
          <h2>HIGH SCORES</h2>
          <ol id="leaderboard" class="leaderboard"></ol>
          <p id="scoresError" class="error hidden"></p>
        </section>
      </main>
    </div>
    <script src="/game.js" type="module"></script>
  </body>
</html>
