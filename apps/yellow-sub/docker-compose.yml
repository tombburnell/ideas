services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yellowsub
      POSTGRES_PASSWORD: yellowsub
      POSTGRES_DB: yellowsub
    ports:
      - "5433:5432"
    volumes:
      - yellow_sub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yellowsub -d yellowsub"]
      interval: 3s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  yellow_sub_pg:
