services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yellowsub
      POSTGRES_PASSWORD: yellowsub
      POSTGRES_DB: yellowsub
    volumes:
      - yellow_sub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yellowsub -d yellowsub"]
      interval: 3s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 5

  # Bind-mounts repo; Nest/Vite watch reload on edits. CHOKIDAR_USEPOLLING helps Docker Desktop file events.
  dev:
    image: node:22-bookworm
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/api/node_modules
      - /app/admin-web/node_modules
      - /app/packages/sdk/node_modules
    ports:
      - "4000:4000"
      - "5174:5173"
    environment:
      NODE_ENV: development
      PORT: "4000"
      DATABASE_URL: postgresql://yellowsub:yellowsub@postgres:5432/yellowsub
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: http://localhost:4000
      CHOKIDAR_USEPOLLING: "true"
    env_file:
      - path: api/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      >
        sh -c "npm ci && npm run prisma:generate -w @yellow-sub/api &&
        npm run prisma:deploy -w @yellow-sub/api &&
        rm -rf api/dist api/tsconfig.tsbuildinfo &&
        npm run build -w @yellow-sub/api &&
        npx concurrently -n api,admin \"npm run dev -w @yellow-sub/api\"
        \"npm run dev -w @yellow-sub/admin-web -- --host 0.0.0.0\""

volumes:
  yellow_sub_pg:
