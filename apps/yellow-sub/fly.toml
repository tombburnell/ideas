app = "yellow-sub"
primary_region = "lhr"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  ADMIN_DIST_PATH = "../admin-web/dist"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
